<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1830"/>
      <stop offset="100%" stop-color="#05070f"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#2e75b6"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d7fff"/>
      <stop offset="100%" stop-color="#4a9fd4"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Star dots -->
  <circle cx="90"  cy="68"  r="1.2" fill="#ffffff" opacity="0.4"/>
  <circle cx="422" cy="98"  r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="60"  cy="392" r="1.2" fill="#ffffff" opacity="0.25"/>
  <circle cx="452" cy="437" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="150" cy="452" r="0.8" fill="#ffffff" opacity="0.2"/>
  <circle cx="392" cy="60"  r="0.8" fill="#ffffff" opacity="0.35"/>
  <circle cx="113" cy="264" r="0.8" fill="#7c5cff" opacity="0.5"/>
  <circle cx="400" cy="302" r="1.2" fill="#2e75b6" opacity="0.4"/>

  <!-- Glow behind hex -->
  <polygon points="256,90 405,167 405,345 256,422 107,345 107,167"
    fill="#7c5cff" opacity="0.15"/>

  <!-- Main hexagon -->
  <polygon points="256,93 403,168 403,344 256,419 109,344 109,168"
    fill="url(#hexGrad)"/>

  <!-- Inner ring -->
  <polygon points="256,127 374,188 374,324 256,385 138,324 138,188"
    fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.1"/>

  <!-- Top highlight edge -->
  <polyline points="256,93 109,168 109,256"
    fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.18"
    stroke-linecap="round"/>

  <!-- J — top horizontal bar -->
  <rect x="222" y="148" width="52" height="33" rx="6" fill="white"/>
  <!-- J — vertical stem -->
  <rect x="247" y="148" width="27" height="172" rx="0" fill="white"/>
  <!-- J — bottom curve (white outer) -->
  <path d="M 274 286 Q 274 346 248 352 Q 205 360 187 322 Q 180 307 184 295"
    fill="none" stroke="white" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- J — bottom curve (inner erase to hex color) -->
  <path d="M 274 286 Q 274 330 251 337 Q 219 345 203 317 Q 198 306 200 296"
    fill="none" stroke="url(#hexGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Epi curve pulse at bottom -->
  <polyline points="158,378 181,378 192,361 205,392 217,369 230,381 256,381 286,381"
    fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.3"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vertex accent dots -->
  <circle cx="256" cy="93"  r="3" fill="#9d7fff" opacity="0.7"/>
  <circle cx="403" cy="168" r="2.5" fill="#4a9fd4" opacity="0.5"/>
  <circle cx="403" cy="344" r="2.5" fill="#4a9fd4" opacity="0.5"/>
  <circle cx="256" cy="419" r="3" fill="#9d7fff" opacity="0.5"/>
  <circle cx="109" cy="344" r="2.5" fill="#7c5cff" opacity="0.5"/>
  <circle cx="109" cy="168" r="2.5" fill="#7c5cff" opacity="0.5"/>
</svg>
